# Demo 场景 - "项目Alpha上线之旅"
# 模拟2周跨部门协作对话

scenarios:
  - chat_id: "oc_alpha_core"
    chat_name: "项目Alpha核心群"
    messages:
      # Day 1: 项目启动
      - msg_id: "msg_001"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "各位，项目Alpha正式启动，我们需要先确定技术架构。大家有什么建议？"
        timestamp: "2026-04-01T09:00:00"
        msg_type: "text"

      - msg_id: "msg_002"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "我建议用微服务架构，Spring Cloud + Kubernetes，这样扩展性好"
        timestamp: "2026-04-01T09:05:00"
        msg_type: "text"

      - msg_id: "msg_003"
        sender_id: "ou_wangwu"
        sender_name: "王五"
        content: "考虑到团队规模和项目周期，我觉得单体架构更合适，先用Next.js做前端，Go做后端"
        timestamp: "2026-04-01T09:10:00"
        msg_type: "text"

      - msg_id: "msg_004"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "王五说得对，我们团队只有5个后端，微服务太重了。决定采用单体架构：前端Next.js + 后端Go"
        timestamp: "2026-04-01T09:15:00"
        msg_type: "text"

      - msg_id: "msg_005"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "接下来确认分工：@李四 你负责后端API开发，@王五 负责前端，@赵六 负责数据库和基础设施，@钱七 负责测试"
        timestamp: "2026-04-01T09:30:00"
        msg_type: "text"

      - msg_id: "msg_006"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "收到，后端API我来负责。数据库选什么？PostgreSQL还是MySQL？"
        timestamp: "2026-04-01T09:35:00"
        msg_type: "text"

      - msg_id: "msg_007"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "推荐PostgreSQL，JSON支持和扩展性更好，适合我们的业务场景"
        timestamp: "2026-04-01T09:40:00"
        msg_type: "text"

      - msg_id: "msg_008"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "好，数据库用PostgreSQL。还有，我们的代码规范需要统一，先定下Go的代码风格"
        timestamp: "2026-04-01T09:45:00"
        msg_type: "text"

      - msg_id: "msg_009"
        sender_id: "ou_qianqi"
        sender_name: "钱七"
        content: "测试方面，我建议用Playwright做E2E，Go自带的testing做单元测试"
        timestamp: "2026-04-01T10:00:00"
        msg_type: "text"

      # Day 2: 技术深入
      - msg_id: "msg_010"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "关于认证方案，我们用JWT还是Session？"
        timestamp: "2026-04-02T10:00:00"
        msg_type: "text"

      - msg_id: "msg_011"
        sender_id: "ou_wangwu"
        sender_name: "王五"
        content: "JWT吧，前后端分离更方便，也支持移动端扩展"
        timestamp: "2026-04-02T10:05:00"
        msg_type: "text"

      - msg_id: "msg_012"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "注意JWT的安全问题，密钥管理要做好，建议用RS256而非HS256"
        timestamp: "2026-04-02T10:10:00"
        msg_type: "text"

      - msg_id: "msg_013"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "同意，认证用JWT + RS256。赵六你来负责安全方案的制定"
        timestamp: "2026-04-02T10:15:00"
        msg_type: "text"

      - msg_id: "msg_014"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "API设计我们用REST还是gRPC？"
        timestamp: "2026-04-02T14:00:00"
        msg_type: "text"

      - msg_id: "msg_015"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "对外用REST，内部服务间如果后续拆分可以用gRPC，现在先用REST"
        timestamp: "2026-04-02T14:05:00"
        msg_type: "text"

      # Day 3: 需求讨论
      - msg_id: "msg_016"
        sender_id: "ou_wangwu"
        sender_name: "王五"
        content: "产品经理发来了新需求，要求增加实时通知功能，这个怎么实现？"
        timestamp: "2026-04-03T09:00:00"
        msg_type: "text"

      - msg_id: "msg_017"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "可以用WebSocket，Go的goroutine处理起来很方便"
        timestamp: "2026-04-03T09:05:00"
        msg_type: "text"

      - msg_id: "msg_018"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "WebSocket可以，但要注意连接管理和心跳机制，服务器资源消耗要做好预估"
        timestamp: "2026-04-03T09:10:00"
        msg_type: "text"

      - msg_id: "msg_019"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "好，实时通知用WebSocket方案。赵六，@你负责评估服务器资源需求，下周一之前给个方案"
        timestamp: "2026-04-03T09:15:00"
        msg_type: "text"

      - msg_id: "msg_020"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "收到，我周四之前给出资源评估方案"
        timestamp: "2026-04-03T09:20:00"
        msg_type: "text"

      # Day 4: 架构变更 (关键冲突场景)
      - msg_id: "msg_021"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "紧急通知：CTO要求我们改用MySQL，公司已采购MySQL企业版许可证，PostgreSQL不走了"
        timestamp: "2026-04-04T14:00:00"
        msg_type: "text"

      - msg_id: "msg_022"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "啊？之前定的PostgreSQL，我已经开始搭环境了...MySQL的JSON支持不如PG"
        timestamp: "2026-04-04T14:05:00"
        msg_type: "text"

      - msg_id: "msg_023"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "没办法，这是上面的决定。赵六你调整一下，MySQL 8.0的JSON功能也够用了"
        timestamp: "2026-04-04T14:10:00"
        msg_type: "text"

      - msg_id: "msg_024"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "数据库从PostgreSQL改为MySQL，我这边API层也要调整SQL语法"
        timestamp: "2026-04-04T14:15:00"
        msg_type: "text"

      # Day 5: 会议讨论
      - msg_id: "msg_025"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "今天下午3点开架构评审会议，大家准备一下"
        timestamp: "2026-04-05T10:00:00"
        msg_type: "text"

      - msg_id: "msg_026"
        sender_id: "ou_wangwu"
        sender_name: "王五"
        content: "前端框架我调研了一下，考虑到SEO需求和团队经验，还是用Next.js App Router"
        timestamp: "2026-04-05T10:30:00"
        msg_type: "text"

      - msg_id: "msg_027"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "后端目录结构我提议按DDD分层：handler/service/repository/model"
        timestamp: "2026-04-05T11:00:00"
        msg_type: "text"

      - msg_id: "msg_028"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "DDD分层同意。还有个问题：部署方案？Docker Compose还是直接K8s？"
        timestamp: "2026-04-05T11:30:00"
        msg_type: "text"

      - msg_id: "msg_029"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "现阶段用Docker Compose就够了，上K8s太重，等业务量上来了再迁移"
        timestamp: "2026-04-05T11:35:00"
        msg_type: "text"

      - msg_id: "msg_030"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "好，部署先用Docker Compose。今天的架构评审会议结束，谢谢大家！"
        timestamp: "2026-04-05T15:30:00"
        msg_type: "text"
        is_meeting_end: true

      # Day 7: 新需求
      - msg_id: "msg_031"
        sender_id: "ou_qianqi"
        sender_name: "钱七"
        content: "监控方案还没定，我们需要决定用什么监控工具？Prometheus还是Datadog？"
        timestamp: "2026-04-07T09:00:00"
        msg_type: "text"

      - msg_id: "msg_032"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "开源方案用Prometheus + Grafana就够了，Datadog要付费而且数据出境有合规问题"
        timestamp: "2026-04-07T09:10:00"
        msg_type: "text"

      - msg_id: "msg_033"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "监控工具先不急定，等赵六的WebSocket资源评估方案出来一起看"
        timestamp: "2026-04-07T09:15:00"
        msg_type: "text"

      # Day 8: 集成问题
      - msg_id: "msg_034"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "遇到个问题：WebSocket和REST API的认证怎么统一？现在两套token管理比较混乱"
        timestamp: "2026-04-08T10:00:00"
        msg_type: "text"

      - msg_id: "msg_035"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "建议WebSocket连接建立时先走HTTP握手验证JWT，后续用连接ID维护状态"
        timestamp: "2026-04-08T10:10:00"
        msg_type: "text"

      - msg_id: "msg_036"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "赵六的方案可以，统一认证流程。李四你来实现"
        timestamp: "2026-04-08T10:15:00"
        msg_type: "text"

      # Day 10: 测试部署
      - msg_id: "msg_037"
        sender_id: "ou_qianqi"
        sender_name: "钱七"
        content: "E2E测试框架搭好了，现在跑了50个用例，3个失败，主要是WebSocket重连的问题"
        timestamp: "2026-04-10T14:00:00"
        msg_type: "text"

      - msg_id: "msg_038"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "WebSocket重连的bug我来看，应该是心跳超时没有正确处理"
        timestamp: "2026-04-10T14:05:00"
        msg_type: "text"

      - msg_id: "msg_039"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "WebSocket资源评估方案出来了：预估需要4核8G服务器2台，支持5000并发连接"
        timestamp: "2026-04-10T16:00:00"
        msg_type: "text"

      - msg_id: "msg_040"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "好，资源方案收到。监控方案也定了吧：用Prometheus + Grafana"
        timestamp: "2026-04-10T16:10:00"
        msg_type: "text"

      # Day 14: 上线复盘
      - msg_id: "msg_041"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "项目Alpha已成功上线！开个复盘会，总结一下经验教训"
        timestamp: "2026-04-14T10:00:00"
        msg_type: "text"

      - msg_id: "msg_042"
        sender_id: "ou_lisi"
        sender_name: "李四"
        content: "最大教训是数据库中途从PostgreSQL换MySQL，浪费了2天时间"
        timestamp: "2026-04-14T10:05:00"
        msg_type: "text"

      - msg_id: "msg_043"
        sender_id: "ou_wangwu"
        sender_name: "王五"
        content: "前端方面，Next.js App Router选对了，SEO效果很好"
        timestamp: "2026-04-14T10:10:00"
        msg_type: "text"

      - msg_id: "msg_044"
        sender_id: "ou_qianqi"
        sender_name: "钱七"
        content: "测试方面，Playwright + Go testing的组合很高效，覆盖率达到了85%"
        timestamp: "2026-04-14T10:15:00"
        msg_type: "text"

      - msg_id: "msg_045"
        sender_id: "ou_zhaoliu"
        sender_name: "赵六"
        content: "Docker Compose部署方案验证通过，后续如果需要扩展可以平滑迁移K8s"
        timestamp: "2026-04-14T10:20:00"
        msg_type: "text"

      - msg_id: "msg_046"
        sender_id: "ou_zhangsan"
        sender_name: "张三"
        content: "感谢大家的辛苦付出！复盘会议到此结束"
        timestamp: "2026-04-14T11:00:00"
        msg_type: "text"
        is_meeting_end: true
